<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Swifly — Home States</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" />
  <style>
    :root {
      --bg: #06060b;
      --surface: #101017;
      --border: #1b1b24;
      --purple: #AE45FF;
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.5);
      --text-tertiary: rgba(255, 255, 255, 0.25);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      font-family: Poppins, -apple-system, sans-serif;
      color: var(--text-primary);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      gap: 40px;
      padding: 40px 20px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Phone frame ── */
    .phone {
      width: 390px;
      height: 844px;
      background: var(--bg);
      border-radius: 44px;
      overflow: hidden;
      position: relative;
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: 0 0 80px rgba(174, 69, 255, 0.06);
      flex-shrink: 0;
    }

    .status-bar {
      height: 54px;
      padding: 14px 28px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      font-weight: 600;
    }

    .status-time { letter-spacing: 0.02em; }

    .status-icons {
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .status-icons svg { width: 16px; height: 16px; opacity: 0.9; }

    .dynamic-island {
      width: 126px;
      height: 36px;
      background: #000;
      border-radius: 20px;
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
    }

    .header {
      padding: 8px 24px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 48px;
    }

    .mic-toggle {
      width: 52px;
      height: 30px;
      border-radius: 20px;
      background: rgba(174, 69, 255, 0.15);
      border: 1px solid rgba(174, 69, 255, 0.3);
      position: relative;
      display: flex;
      align-items: center;
    }

    .mic-toggle-knob {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--purple);
      position: absolute;
      left: 25px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .mic-toggle-knob svg {
      width: 12px;
      height: 12px;
      color: #fff;
    }

    .header-settings {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      background: none;
      border: none;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .header-settings svg { width: 20px; height: 20px; }

    .divider {
      margin: 12px 24px 0;
      height: 1px;
      background: repeating-linear-gradient(90deg, rgba(255,255,255,0.06) 0px, rgba(255,255,255,0.06) 2px, transparent 2px, transparent 6px);
    }

    .main-content {
      display: flex;
      flex-direction: column;
      height: calc(100% - 54px);
    }

    .transcription-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 32px;
      text-align: center;
      position: relative;
    }

    .transcription-empty-text {
      font-size: 13px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.2);
      line-height: 1.5;
    }

    .transcription-live {
      font-size: 20px;
      font-weight: 300;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.85);
      letter-spacing: -0.01em;
      max-width: 100%;
      text-align: left;
      align-self: flex-start;
    }

    .share-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 20px;
      border: 1px solid rgba(174, 69, 255, 0.3);
      background: rgba(174, 69, 255, 0.1);
      color: var(--purple);
      font-size: 12px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      margin-top: 16px;
      align-self: flex-start;
    }

    .share-btn svg {
      width: 14px;
      height: 14px;
    }

    .history-hint {
      padding: 0 24px 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 11px;
      color: var(--text-tertiary);
      letter-spacing: 0.02em;
    }

    .history-hint svg {
      width: 12px;
      height: 12px;
    }

    .action-area {
      padding: 12px 24px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    /* Overlay */
    .overlay-wrapper {
      position: relative;
      width: 74px;
      height: 74px;
    }

    .overlay-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid rgba(215, 215, 215, 0.2);
    }

    .overlay-fill {
      position: absolute;
      inset: 2px;
      border-radius: 50%;
      background: transparent;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .overlay-dot {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--purple);
      transform: translate(-50%, -50%);
    }

    /* Tab bar */
    .tab-bar {
      height: 80px;
      padding: 0 20px;
      padding-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: space-around;
      background: linear-gradient(180deg, transparent 0%, rgba(6, 6, 11, 0.95) 30%);
      position: relative;
    }

    .tab-bar::before {
      content: '';
      position: absolute;
      top: 0;
      left: 24px;
      right: 24px;
      height: 1px;
      background: rgba(255, 255, 255, 0.04);
    }

    .tab-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .tab-item svg {
      width: 22px;
      height: 22px;
      color: var(--text-tertiary);
    }

    .tab-item span {
      font-size: 10px;
      font-weight: 500;
      color: var(--text-tertiary);
      letter-spacing: 0.02em;
    }

    .tab-item.active svg { color: var(--purple); }
    .tab-item.active span { color: var(--purple); }

    .home-indicator {
      position: absolute;
      bottom: 6px;
      left: 50%;
      transform: translateX(-50%);
      width: 134px;
      height: 5px;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.15);
      z-index: 30;
    }

    /* Labels */
    .state-label {
      position: absolute;
      top: -32px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      font-weight: 500;
      color: var(--text-tertiary);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .phone-wrap {
      position: relative;
    }
  </style>
</head>

  </div>
