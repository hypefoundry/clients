<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Swifly — Update Seats</title>
  <style>
    /* ─────────────────────────────────────────────────────────
     * DESIGN TOKENS
     * ───────────────────────────────────────────────────────── */
    :root {
      --bg-page: #06060b;
      --bg-overlay: rgba(0, 0, 0, 0.6);
      --bg-modal: #0d0d14;
      --card-border: rgba(255, 255, 255, 0.08);
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.55);
      --text-tertiary: rgba(255, 255, 255, 0.35);
      --accent-violet: #a78bfa;
      --accent-violet-dim: rgba(167, 139, 250, 0.15);
      --aurora-violet: #7c3aed;
      --aurora-magenta: #c026d3;
      --green-400: #4ade80;
      --amber-400: #fbbf24;
      --radius-card: 20px;
      --radius-btn: 12px;
    }

    /* ─────────────────────────────────────────────────────────
     * RESET & PAGE
     * ───────────────────────────────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-page);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      position: relative;
      overflow: hidden;
    }

    /* Page aurora */
    body::before {
      content: '';
      position: fixed;
      top: -20%;
      right: -10%;
      width: 60%;
      height: 60%;
      background: radial-gradient(
        ellipse at 60% 30%,
        rgba(152, 0, 232, 0.15) 0%,
        rgba(139, 92, 246, 0.08) 35%,
        rgba(107, 33, 168, 0.04) 55%,
        transparent 75%
      );
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
    }

    /* ─────────────────────────────────────────────────────────
     * ANIMATION STORYBOARD
     *
     *    0ms   overlay fades in
     *  100ms   modal scales up from 0.95
     *  200ms   title appears
     *  300ms   stepper fades in
     *  400ms   cost preview fades in
     *  500ms   buttons appear
     * ───────────────────────────────────────────────────────── */
    @keyframes overlayIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.95) translateY(8px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Flowing border for modal card */
    @property --modal-border-angle {
      syntax: '<angle>';
      initial-value: 0deg;
      inherits: false;
    }

    @keyframes modalBorderFlow {
      to { --modal-border-angle: 360deg; }
    }

/* Flowing border for Update button */
    @property --modal-btn-angle {
      syntax: '<angle>';
      initial-value: 0deg;
      inherits: false;
    }

    @keyframes modalBtnFlow {
      to { --modal-btn-angle: 360deg; }
    }

    /* ─────────────────────────────────────────────────────────
     * OVERLAY
     * ───────────────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg-overlay);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      animation: overlayIn 0.25s ease-out both;
    }

    /* ─────────────────────────────────────────────────────────
     * MODAL
     * ───────────────────────────────────────────────────────── */
    .modal {
      --modal-border-angle: 0deg;
      width: 400px;
      border: 1px solid transparent;
      background:
        linear-gradient(var(--bg-modal), var(--bg-modal)) padding-box,
        conic-gradient(
          from var(--modal-border-angle),
          rgba(255,255,255,0.07) 0%,
          rgba(255,255,255,0.07) 70%,
          var(--aurora-violet) 80%,
          var(--aurora-magenta) 87%,
          #9800E8 93%,
          rgba(255,255,255,0.07) 100%
        ) border-box;
      border-radius: var(--radius-card);
      padding: 28px;
      position: relative;
      animation:
        modalIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) 0.1s both,
        modalBorderFlow 6s linear 0.45s infinite;
    }

    /* ─────────────────────────────────────────────────────────
     * HEADER
     * ───────────────────────────────────────────────────────── */
    .modal-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 24px;
      animation: fadeUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
    }

    .modal-title {
      font-size: 20px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }

    .modal-close {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: transparent;
      border-radius: 8px;
      cursor: pointer;
      transition: color 0.2s ease-out;
      flex-shrink: 0;
      margin: -4px -4px 0 0;
      color: var(--text-tertiary);
    }

    .modal-close:hover {
      color: var(--text-primary);
    }

    .modal-close svg {
      width: 14px;
      height: 14px;
    }

    /* ─────────────────────────────────────────────────────────
     * STEPPER
     * ───────────────────────────────────────────────────────── */
    .stepper-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 20px;
      animation: fadeUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
    }

    .stepper {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 12px;
    }

    .stepper-btn {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255,255,255,0.10);
      background: transparent;
      border-radius: 12px;
      cursor: pointer;
      transition: border-color 0.2s ease-out, color 0.2s ease-out;
      color: var(--text-secondary);
      font-family: inherit;
    }

    .stepper-btn:hover:not(:disabled) {
      border-color: rgba(255,255,255,0.22);
      color: var(--text-primary);
    }

    .stepper-btn:disabled {
      opacity: 0.25;
      cursor: not-allowed;
    }

    .stepper-btn svg {
      width: 18px;
      height: 18px;
    }

    .stepper-value {
      font-size: 36px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.03em;
      line-height: 1;
      min-width: 56px;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    .stepper-context {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .stepper-pill {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      background: rgba(255, 255, 255, 0.06);
      padding: 4px 10px;
      border-radius: 100px;
      white-space: nowrap;
    }

    .stepper-floor {
      font-size: 11px;
      color: var(--amber-400);
      margin-top: 6px;
      opacity: 0;
      transition: opacity 0.2s ease-out;
    }

    .stepper-floor.visible {
      opacity: 1;
    }

    /* ─────────────────────────────────────────────────────────
     * DIVIDER
     * ───────────────────────────────────────────────────────── */
    .modal-divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.06);
      margin-bottom: 20px;
      animation: fadeUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) 0.35s both;
    }

    /* ─────────────────────────────────────────────────────────
     * COST PREVIEW
     * ───────────────────────────────────────────────────────── */
    .cost-preview {
      margin-bottom: 24px;
      animation: fadeUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) 0.4s both;
    }

    .cost-label {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-tertiary);
      margin-bottom: 4px;
    }

    .cost-value {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    .cost-new {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.01em;
      font-variant-numeric: tabular-nums;
    }

    .cost-amount {
      display: inline-flex;
      align-items: baseline;
    }

    .cost-unit {
      font-size: 13px;
      font-weight: 400;
      color: var(--text-secondary);
      margin-left: 1px;
    }

    .cost-old {
      font-size: 14px;
      color: var(--text-tertiary);
      text-decoration: line-through;
      transition: opacity 0.25s ease-out;
    }

    .cost-note {
      font-size: 12px;
      color: var(--text-tertiary);
      margin-top: 6px;
    }

    /* ─────────────────────────────────────────────────────────
     * ACTIONS
     * ───────────────────────────────────────────────────────── */
    .modal-actions {
      display: flex;
      gap: 10px;
      animation: fadeUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) 0.5s both;
    }

    .btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px 20px;
      font-size: 14px;
      font-weight: 500;
      border-radius: var(--radius-btn);
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s ease-out, border-color 0.2s ease-out, color 0.2s ease-out, box-shadow 0.3s ease-out;
    }

    /* Cancel — ghost with subtle border lift on hover */
    .btn--cancel {
      border: 1px solid rgba(255,255,255,0.10);
      background: transparent;
      color: var(--text-secondary);
    }

    .btn--cancel:hover {
      border-color: rgba(255,255,255,0.22);
      color: var(--text-primary);
    }

    /* Update — gradient wakes up when seat count changes */
    .btn--confirm {
      --modal-btn-angle: 0deg;
      position: relative;
      border: 1px solid rgba(255,255,255,0.10);
      background: transparent;
      color: var(--text-secondary);
      font-weight: 600;
      transition: color 0.5s ease-in-out, border-color 0.5s ease-in-out, box-shadow 0.5s ease-in-out;
    }

    .btn--confirm::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      border: 1px solid transparent;
      background:
        linear-gradient(var(--bg-modal), var(--bg-modal)) padding-box,
        conic-gradient(
          from var(--modal-btn-angle),
          rgba(255,255,255,0.10) 0%,
          rgba(255,255,255,0.10) 65%,
          var(--aurora-violet) 75%,
          var(--aurora-magenta) 85%,
          #9800E8 92%,
          rgba(255,255,255,0.10) 100%
        ) border-box;
      animation: modalBtnFlow 4s linear infinite;
      opacity: 0;
      transition: opacity 0.6s ease-in-out;
      pointer-events: none;
      z-index: 0;
    }

    .btn--confirm span {
      position: relative;
      z-index: 1;
    }

    /* Active state — seats have changed */
    .btn--confirm.active {
      border-color: transparent;
      color: #ffffff;
    }

    .btn--confirm.active::before {
      opacity: 1;
    }

    .btn--confirm.active:hover {
      box-shadow:
        0 0 14px rgba(124, 58, 237, 0.25),
        0 0 28px rgba(152, 0, 232, 0.15),
        0 0 48px rgba(124, 58, 237, 0.08);
    }
  </style>
</head>
<body>

  <!-- ═══════════════════════════════════════════════════════
       MODAL OVERLAY
       ═══════════════════════════════════════════════════════ -->
  <div class="modal-overlay">
    <div class="modal">

      <!-- Header -->
      <div class="modal-header">
        <h2 class="modal-title">Adjust your seats</h2>
        <button class="modal-close" aria-label="Close">
          <svg viewBox="0 0 14 14" fill="none"><path d="M3 3L11 11M11 3L3 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
      </div>

      <!-- Stepper -->
      <div class="stepper-section">
        <div class="stepper">
          <button class="stepper-btn" id="decrement" aria-label="Remove seat">
            <svg viewBox="0 0 18 18" fill="none"><path d="M4 9H14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          </button>
          <span class="stepper-value" id="seatCount">5</span>
          <button class="stepper-btn" id="increment" aria-label="Add seat">
            <svg viewBox="0 0 18 18" fill="none"><path d="M9 4V14M4 9H14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          </button>
        </div>
        <div class="stepper-context">
          <span class="stepper-pill">5 seats now</span>
          <span class="stepper-pill">3 active</span>
        </div>
        <p class="stepper-floor" id="floorMessage">3 seats minimum — one per active member</p>
      </div>

      <div class="modal-divider"></div>

      <!-- Cost preview -->
      <div class="cost-preview">
        <p class="cost-label">Billed monthly</p>
        <div class="cost-value">
          <span class="cost-amount"><span class="cost-new" id="costNew">$120</span><span class="cost-unit">/mo</span></span>
          <span class="cost-old" id="costOld" style="opacity: 0;">$120/mo</span>
        </div>
        <p class="cost-note" id="costBreakdown">$24/seat × 5 seats</p>
      </div>

      <!-- Actions -->
      <div class="modal-actions">
        <button class="btn btn--cancel">Cancel</button>
        <button class="btn btn--confirm" id="confirmBtn"><span>Update seats</span></button>
      </div>

    </div>
  </div>

  <script>
    const PRICE_PER_SEAT = 24;
    const CURRENT_SEATS = 5;
    const ACTIVE_MEMBERS = 3;
    const MIN_SEATS = ACTIVE_MEMBERS;

    let seatCount = CURRENT_SEATS;

    const seatDisplay = document.getElementById('seatCount');
    const decrementBtn = document.getElementById('decrement');
    const incrementBtn = document.getElementById('increment');
    const floorMessage = document.getElementById('floorMessage');
    const costOld = document.getElementById('costOld');
    const costNew = document.getElementById('costNew');
    const costBreakdown = document.getElementById('costBreakdown');
    const confirmBtn = document.getElementById('confirmBtn');

    function update() {
      seatDisplay.textContent = seatCount;

      // Decrement floor
      decrementBtn.disabled = seatCount <= MIN_SEATS;
      floorMessage.classList.toggle('visible', seatCount <= MIN_SEATS);

      // Cost
      const oldTotal = CURRENT_SEATS * PRICE_PER_SEAT;
      const newTotal = seatCount * PRICE_PER_SEAT;
      const changed = seatCount !== CURRENT_SEATS;

      costBreakdown.textContent = `$${PRICE_PER_SEAT}/seat × ${seatCount} seat${seatCount !== 1 ? 's' : ''}`;
      costNew.textContent = `$${newTotal}`;

      // Show old price when changed
      costOld.textContent = `$${oldTotal}/mo`;
      costOld.style.opacity = changed ? '1' : '0';

      // Activate confirm only when changed
      confirmBtn.classList.toggle('active', changed);
    }

    decrementBtn.addEventListener('click', () => {
      if (seatCount > MIN_SEATS) {
        seatCount--;
        update();
      }
    });

    incrementBtn.addEventListener('click', () => {
      seatCount++;
      update();
    });

    update();
  </script>

</body>
</html>
