<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Swifly — DMG Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #1a1a2e;
      background-image:
        radial-gradient(ellipse at 50% 40%, rgba(174, 69, 255, 0.04) 0%, transparent 60%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    }

    /* ── macOS Window Chrome ── */
    .macos-window {
      width: 660px;
      border-radius: 10px;
      overflow: hidden;
      box-shadow:
        0 40px 80px rgba(0, 0, 0, 0.5),
        0 10px 30px rgba(0, 0, 0, 0.3),
        0 0 0 0.5px rgba(255, 255, 255, 0.1);
    }

    /* Title bar */
    .titlebar {
      height: 28px;
      background: linear-gradient(180deg, #3a3a3a 0%, #2d2d2d 100%);
      border-bottom: 1px solid rgba(0, 0, 0, 0.4);
      display: flex;
      align-items: center;
      padding: 0 13px;
      gap: 8px;
      position: relative;
    }

    .traffic-light {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      position: relative;
    }

    .traffic-light::after {
      content: '';
      position: absolute;
      inset: 0.5px;
      border-radius: 50%;
    }

    .traffic-light--close {
      background: #ff5f57;
      box-shadow: inset 0 -0.5px 0.5px rgba(0, 0, 0, 0.15);
    }
    .traffic-light--close::after {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.15) 0%, transparent 50%);
    }

    .traffic-light--minimize {
      background: #ffbd2e;
      box-shadow: inset 0 -0.5px 0.5px rgba(0, 0, 0, 0.15);
    }
    .traffic-light--minimize::after {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.15) 0%, transparent 50%);
    }

    .traffic-light--maximize {
      background: #28c840;
      box-shadow: inset 0 -0.5px 0.5px rgba(0, 0, 0, 0.15);
    }
    .traffic-light--maximize::after {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.15) 0%, transparent 50%);
    }

    .titlebar-text {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 13px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: -0.01em;
    }

    /* ── DMG Content Area ── */
    .dmg-content {
      width: 660px;
      height: 400px;
      background: #0a0a10;
      position: relative;
      overflow: hidden;
    }

    /* Background layers */
    .bg-gradient {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 50% 30%, rgba(174, 69, 255, 0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 30% 70%, rgba(99, 102, 241, 0.05) 0%, transparent 50%),
        radial-gradient(ellipse at 70% 60%, rgba(139, 92, 246, 0.04) 0%, transparent 50%),
        linear-gradient(180deg, #0c0c14 0%, #08080e 50%, #0a0a12 100%);
    }

    .bg-noise {
      position: absolute;
      inset: 0;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    .glow-arc {
      position: absolute;
      top: -100px;
      left: 50%;
      transform: translateX(-50%);
      width: 400px;
      height: 200px;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(174, 69, 255, 0.12) 0%, transparent 70%);
      filter: blur(30px);
    }

    /* Content layout */
    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      height: 100%;
      padding-top: 50px;
    }

    .instruction {
      font-size: 18px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.85);
      text-align: center;
      line-height: 1.3;
      letter-spacing: -0.02em;
      margin-bottom: 40px;
    }

    .instruction em {
      font-style: normal;
      color: #AE45FF;
    }

    /* Icons row */
    .icons-row {
      display: flex;
      align-items: center;
      gap: 50px;
    }

    .icon-slot {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    /* Realistic macOS app icon */
    .swifly-icon {
      width: 80px;
      height: 80px;
      border-radius: 18px;
      background: linear-gradient(145deg, #1a1a24 0%, #0e0e16 100%);
      border: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow:
        0 4px 16px rgba(0, 0, 0, 0.4),
        0 1px 4px rgba(0, 0, 0, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    .swifly-icon svg {
      width: 44px;
      height: auto;
    }

    /* macOS Applications folder */
    .apps-folder {
      width: 72px;
      height: 62px;
      position: relative;
    }

    .apps-folder-tab {
      position: absolute;
      top: 0;
      left: 8px;
      width: 22px;
      height: 10px;
      background: linear-gradient(180deg, #6cb4ee 0%, #4a9de0 100%);
      border-radius: 3px 3px 0 0;
    }

    .apps-folder-body {
      position: absolute;
      top: 9px;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(180deg, #5aadee 0%, #3d8fd4 100%);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow:
        0 2px 8px rgba(0, 0, 0, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
    }

    .apps-folder-body svg {
      width: 28px;
      height: 28px;
      color: rgba(255, 255, 255, 0.7);
    }

    .icon-label {
      font-size: 11px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.8);
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.6);
    }

    /* Arrow */
    .arrow {
      display: flex;
      align-items: center;
      gap: 2px;
      margin-top: -10px;
    }

    .arrow-chevron {
      width: 14px;
      height: 14px;
    }

    .arrow-chevron:nth-child(1) { color: rgba(174, 69, 255, 0.5); }
    .arrow-chevron:nth-child(2) { color: rgba(174, 69, 255, 0.35); }
    .arrow-chevron:nth-child(3) { color: rgba(174, 69, 255, 0.2); }

    /* Brand wordmark */
    .brand-wordmark {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1;
      opacity: 0.15;
    }

    .brand-wordmark svg {
      height: 8px;
      width: auto;
    }

    /* Bottom line */
    .bottom-line {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(174, 69, 255, 0.15) 30%,
        rgba(174, 69, 255, 0.25) 50%,
        rgba(174, 69, 255, 0.15) 70%,
        transparent 100%
      );
    }
  </style>
</head>
