<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Swifly — Overlay Idle State</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500&display=swap" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #000000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Poppins, -apple-system, BlinkMacSystemFont, sans-serif;
      color: #fff;
      overflow: hidden;
    }

    /* ── Scene container ── */
    .scene {
      display: flex;
      align-items: center;
      gap: 8px;
      position: fixed;
      bottom: 95px;
      right: 64px;
    }

    /* ── Confirmation Toast ── */
    .confirm-toast {
      border-radius: 999px;
      background-color: #101017;
      border: 1px solid #1b1b24;
      display: flex;
      flex-direction: row;
      padding: 8px 12px 8px 15px;
      gap: 8px;
      font-size: 11px;
      white-space: nowrap;
      overflow: hidden;
    }

    .confirm-toast-left {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
    }

    .confirm-toast-right {
      display: flex;
      align-items: center;
      gap: 8px;
      align-self: stretch;
    }

    .confirm-toast-content {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .confirm-toast-icon {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    .confirm-toast-text {
      color: rgba(255, 255, 255, 0.85);
      line-height: 140%;
    }

    .confirm-toast-undo {
      color: #AE45FF;
      font-weight: 500;
      cursor: pointer;
    }

    .confirm-toast-divider {
      width: 1px;
      align-self: stretch;
      background: rgba(255, 255, 255, 0.06);
      flex-shrink: 0;
    }

    .confirm-toast-close {
      width: 18px;
      height: 18px;
      border: none;
      background: none;
      color: rgba(255, 255, 255, 0.35);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      padding: 0;
    }

    .confirm-toast-close svg {
      width: 10px;
      height: 10px;
    }

    /* Progress bar — static at ~60% */
    .confirm-toast-progress-track {
      width: 100%;
      height: 3px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 3px;
      overflow: hidden;
    }

    .confirm-toast-progress {
      height: 100%;
      background: linear-gradient(90deg, #AE45FF, #6a2abf);
      border-radius: 3px;
      width: 60%;
    }

    /* ── Overlay ── */
    .overlay {
      position: relative;
      width: 49px;
      height: 49px;
      flex-shrink: 0;
    }

    /* Grey ring — idle state */
    .ring-grey {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
      -webkit-mask: radial-gradient(circle, transparent 20px, black 21px, black 23px, transparent 24px);
      mask: radial-gradient(circle, transparent 20px, black 21px, black 23px, transparent 24px);
    }

    /* Inner fill — translucent with blur (idle) */
    .overlay-fill {
      position: absolute;
      inset: 3px;
      border-radius: 50%;
      background: rgba(16, 16, 23, 0.3);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    /* Center dot */
    .overlay-dot {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #AE45FF;
      transform: translate(-50%, -50%);
    }
  </style>
</head>
<body>

  <div class="scene">
    <!-- Confirmation Toast -->
    <div class="confirm-toast">
      <div class="confirm-toast-left">
        <div class="confirm-toast-content">
          <svg class="confirm-toast-icon" viewBox="0 0 14 14" fill="none">
            <circle cx="7" cy="7" r="6.5" stroke="#AE45FF" stroke-width="1"/>
            <path d="M4.5 7.5L6 9L9.5 5.5" stroke="#AE45FF" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="confirm-toast-text">Added to your dictionary: 'Guyot'</span>
          <span class="confirm-toast-undo">Undo</span>
        </div>
        <div class="confirm-toast-progress-track">
          <div class="confirm-toast-progress"></div>
        </div>
      </div>
      <div class="confirm-toast-right">
        <div class="confirm-toast-divider"></div>
        <button class="confirm-toast-close">
          <svg viewBox="0 0 10 10" fill="none"><path d="M2 2l6 6M8 2l-6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
      </div>
    </div>

    <!-- Overlay (idle) -->
    <div class="overlay">
      <div class="ring-grey"></div>
      <div class="overlay-fill"></div>
      <div class="overlay-dot"></div>
    </div>
  </div>

</body>
</html>
