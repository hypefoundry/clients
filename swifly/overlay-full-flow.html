<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Swifly — Overlay Full Flow</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500&display=swap" />
  <style>
    /* ─────────────────────────────────────────────────────────
     * ANIMATION STORYBOARD — FULL FLOW
     *
     * 0ms      GLASS IDLE — transparent fill, 1.5px 20% #D7D7D7
     *          stroke, backdrop blur, no dot, no glow
     * Hover:   Fill → #101017, stroke → #1B1B24, dot appears,
     *          fn toast slides in → READY state
     * Unhover: Reverse back to glass idle (if not clicked)
     * Click:   Toast out, dot shrinks, audio lines in → LISTENING
     * +2000ms  Audio lines out, spinner in → LOADING
     * +2000ms  Spinner out, overlay returns to glass idle,
     *          confirm toast appears → GLASS IDLE + CONFIRM
     * ───────────────────────────────────────────────────────── */

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #000000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Poppins, -apple-system, BlinkMacSystemFont, sans-serif;
      color: #fff;
      overflow: hidden;
    }

    /* ── Scene container ── */
    .scene {
      display: flex;
      align-items: center;
      gap: 8px;
      position: fixed;
      bottom: 95px;
      right: 64px;
      cursor: pointer;
    }

    /* ══════════════════════════════════════════════════════════
       FN TOAST
       ══════════════════════════════════════════════════════════ */
    .micro-toast {
      border-radius: 36px;
      background-color: #101017;
      border: 1px solid #1b1b24;
      display: flex;
      align-items: center;
      padding: 8px 13px;
      gap: 5px;
      font-size: 11px;
      white-space: nowrap;
      opacity: 0;
      transform: translateX(20px) scale(0.97);
      transition:
        opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1),
        transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .scene.hover .micro-toast,
    .scene.ready .micro-toast {
      opacity: 1;
      transform: translateX(0) scale(1);
    }

    .scene.listening .micro-toast,
    .scene.loading .micro-toast {
      opacity: 0;
      transform: translateX(20px) scale(0.97);
    }

    .click-or-hold {
      line-height: 140%;
      color: rgba(255, 255, 255, 0.85);
    }

    .key-badge {
      border-radius: 4px;
      background-color: #fff;
      border: 1px solid #e2e2e6;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3px 5px;
      font-size: 8px;
      color: #262626;
      font-weight: 500;
      line-height: 1;
    }

    /* ══════════════════════════════════════════════════════════
       OVERLAY
       ══════════════════════════════════════════════════════════ */
    .overlay {
      position: relative;
      width: 49px;
      height: 49px;
      flex-shrink: 0;
    }

    /* Glass idle ring — 1.5px, 20% #D7D7D7 */
    .ring-glass {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid rgba(215, 215, 215, 0.2);
      transition: border-color 0.35s ease;
    }

    .scene.hover .ring-glass,
    .scene.ready .ring-glass,
    .scene.listening .ring-glass,
    .scene.loading .ring-glass {
      border-color: #1B1B24;
    }

    /* Gradient ring — hidden in idle, appears on activation */
    .ring-gradient {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      opacity: 0;
      background: linear-gradient(
        to top,
        #2A004B 1%,
        #AD46FF 30%,
        #EEAFFF 54%,
        #43EE1D 78%,
        #F6FF00 100%
      );
      -webkit-mask: radial-gradient(circle, transparent 18px, black 18.5px, black 24px, transparent 24.5px);
      mask: radial-gradient(circle, transparent 18px, black 18.5px, black 24px, transparent 24.5px);
      transition: opacity 0.4s ease;
    }

    .scene.listening .ring-gradient,
    .scene.loading .ring-gradient {
      opacity: 1;
    }

    /* Inner fill — transparent glass in idle, solid when hovered/active */
    .overlay-fill {
      position: absolute;
      inset: 1.5px;
      border-radius: 50%;
      background: transparent;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: background 0.35s ease;
    }

    .scene.hover .overlay-fill,
    .scene.ready .overlay-fill,
    .scene.listening .overlay-fill,
    .scene.loading .overlay-fill {
      background: #101017;
    }

    /* Center dot — hidden in glass idle */
    .overlay-dot {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #AE45FF;
      transform: translate(-50%, -50%) scale(1);
      opacity: 1;
      box-shadow: none;
      transition:
        opacity 0.35s cubic-bezier(0.22, 1, 0.36, 1),
        transform 0.35s cubic-bezier(0.22, 1, 0.36, 1),
        box-shadow 0.35s ease;
    }

    .scene.ready .overlay-dot {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
      box-shadow: 0 0 20px rgba(174, 69, 255, 0.45);
    }

    .scene.listening .overlay-dot,
    .scene.loading .overlay-dot {
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.3);
    }

    /* Glow — hidden in idle */
    .overlay-glow {
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      opacity: 0;
      background: linear-gradient(
        to top,
        rgba(42, 0, 75, 0.25) 1%,
        rgba(173, 70, 255, 0.2) 30%,
        rgba(238, 175, 255, 0.15) 54%,
        rgba(67, 238, 29, 0.2) 78%,
        rgba(246, 255, 0, 0.2) 100%
      );
      filter: blur(14px);
      transition: opacity 0.4s ease, filter 0.4s ease;
    }

    .scene.listening .overlay-glow {
      opacity: 1;
    }

    .scene.loading .overlay-glow {
      opacity: 0.7;
      filter: blur(16px);
    }

    /* ══════════════════════════════════════════════════════════
       AUDIO WAVEFORM LINES
       ══════════════════════════════════════════════════════════ */
    .audio-lines {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      align-items: center;
      gap: 3px;
      height: 16px;
      opacity: 0;
      transition: opacity 0.25s ease 0.15s;
    }

    .scene.listening .audio-lines {
      opacity: 1;
    }

    .scene.loading .audio-lines {
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .audio-line {
      width: 2px;
      min-width: 2px;
      max-width: 2px;
      border-radius: 14px;
      transform-origin: center;
      animation: none;
      height: 3.5px;
    }

    /* Solid colours per line */
    .audio-line:nth-child(1),
    .audio-line:nth-child(2) { background: #E56EC5; }
    .audio-line:nth-child(3),
    .audio-line:nth-child(4) { background: #AE45FF; }
    .audio-line:nth-child(5) { background: #43EE1D; }
    .audio-line:nth-child(6),
    .audio-line:nth-child(7) { background: #FCDD09; }

    .scene.listening .audio-line {
      animation: pulse var(--dur) var(--delay) ease-in-out infinite;
    }

    .scene.loading .audio-line {
      animation: none;
    }

    .audio-line:nth-child(1) { --dur: 0.7s;  --delay: 0s;     --max-h: 3.7px; }
    .audio-line:nth-child(2) { --dur: 0.65s; --delay: 0.05s;  --max-h: 7.4px; }
    .audio-line:nth-child(3) { --dur: 0.6s;  --delay: 0.1s;   --max-h: 12px; }
    .audio-line:nth-child(4) { --dur: 0.55s; --delay: 0.15s;  --max-h: 16.6px; }
    .audio-line:nth-child(5) { --dur: 0.6s;  --delay: 0.2s;   --max-h: 12px; }
    .audio-line:nth-child(6) { --dur: 0.65s; --delay: 0.25s;  --max-h: 7.4px; }
    .audio-line:nth-child(7) { --dur: 0.7s;  --delay: 0.3s;   --max-h: 3.7px; }

    @keyframes pulse {
      0%, 100% {
        height: 3.5px;
      }
      50% {
        height: var(--max-h, 12px);
      }
    }

    /* ══════════════════════════════════════════════════════════
       LOADING SPINNER
       ══════════════════════════════════════════════════════════ */
    .loading-spinner {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 26px;
      height: 26px;
      transform: translate(-50%, -50%);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .scene.loading .loading-spinner {
      opacity: 1;
      transition: opacity 0.35s ease 0.15s;
    }

    .spinner-track {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background-color: rgba(255, 255, 255, 0);
    }

    .spinner-arc {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: conic-gradient(from 0deg at 50% 50%, #170b2c 0deg, #ae45ff 360deg) border-box;
      border: 4px solid transparent;
      box-sizing: border-box;
      -webkit-mask:
        linear-gradient(#fff 0 0) padding-box,
        linear-gradient(#fff 0 0) border-box;
      -webkit-mask-composite: xor;
      mask:
        linear-gradient(#fff 0 0) padding-box,
        linear-gradient(#fff 0 0) border-box;
      mask-composite: exclude;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* ══════════════════════════════════════════════════════════
       CONFIRMATION TOAST
       ══════════════════════════════════════════════════════════ */
    .confirm-toast {
      border-radius: 999px;
      background-color: #101017;
      border: 1px solid #1b1b24;
      display: flex;
      flex-direction: row;
      padding: 8px 12px 8px 15px;
      gap: 8px;
      font-size: 11px;
      white-space: nowrap;
      opacity: 0;
      transition:
        opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1),
        transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      pointer-events: none;
      position: absolute;
      right: calc(49px + 8px);
      top: 50%;
      transform: translateX(20px) translateY(-50%) scale(0.97);
      overflow: hidden;
    }

    /* Column 1: stacked content + progress */
    .confirm-toast-left {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
    }

    /* Column 2: divider + close */
    .confirm-toast-right {
      display: flex;
      align-items: center;
      gap: 8px;
      align-self: stretch;
    }

    .confirm-toast.visible {
      opacity: 1;
      transform: translateX(0) translateY(-50%) scale(1);
      pointer-events: auto;
    }

    .confirm-toast-content {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .confirm-toast-icon {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    .confirm-toast-text {
      color: rgba(255, 255, 255, 0.85);
      line-height: 140%;
    }

    .confirm-toast-undo {
      color: #AE45FF;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s ease;
    }

    .confirm-toast-undo:hover {
      opacity: 0.75;
    }

    .confirm-toast-divider {
      width: 1px;
      align-self: stretch;
      background: rgba(255, 255, 255, 0.06);
      flex-shrink: 0;
    }

    .confirm-toast-close {
      width: 18px;
      height: 18px;
      border: none;
      background: none;
      color: rgba(255, 255, 255, 0.35);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      padding: 0;
      transition: color 0.15s ease;
    }

    .confirm-toast-close:hover {
      color: rgba(255, 255, 255, 0.7);
    }

    .confirm-toast-close svg {
      width: 10px;
      height: 10px;
    }

    /* Progress bar */
    .confirm-toast-progress-track {
      width: 100%;
      height: 3px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 3px;
      overflow: hidden;
    }

    .confirm-toast-progress {
      height: 100%;
      background: linear-gradient(90deg, #AE45FF, #6a2abf);
      border-radius: 3px;
      width: 0%;
      transition: none;
    }

    .confirm-toast.visible .confirm-toast-progress {
      animation: progressShrink 4s linear forwards;
    }

    @keyframes progressShrink {
      0% { width: 100%; }
      100% { width: 0%; }
    }

    /* ── Hint ── */
    .hint {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.25);
      font-size: 12px;
      letter-spacing: 0.02em;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div class="scene" id="scene">

    <!-- fn Toast -->
    <div class="micro-toast">
      <span class="click-or-hold">Click or hold</span>
      <div class="key-badge">fn</div>
      <span class="click-or-hold">to start dictating</span>
    </div>

    <!-- Confirmation Toast -->
    <div class="confirm-toast" id="confirmToast">
      <div class="confirm-toast-left">
        <div class="confirm-toast-content">
          <svg class="confirm-toast-icon" viewBox="0 0 14 14" fill="none">
            <circle cx="7" cy="7" r="6.5" stroke="#AE45FF" stroke-width="1"/>
            <path d="M4.5 7.5L6 9L9.5 5.5" stroke="#AE45FF" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="confirm-toast-text">Added to your dictionary: 'Guyot'</span>
          <span class="confirm-toast-undo">Undo</span>
        </div>
        <div class="confirm-toast-progress-track">
          <div class="confirm-toast-progress"></div>
        </div>
      </div>
      <div class="confirm-toast-right">
        <div class="confirm-toast-divider"></div>
        <button class="confirm-toast-close" id="confirmClose">
          <svg viewBox="0 0 10 10" fill="none"><path d="M2 2l6 6M8 2l-6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
      </div>
    </div>

    <!-- Overlay -->
    <div class="overlay" id="overlayEl">
      <div class="ring-glass"></div>
      <div class="ring-gradient"></div>
      <div class="overlay-glow"></div>
      <div class="overlay-fill"></div>
      <div class="overlay-dot"></div>
      <div class="audio-lines">
        <div class="audio-line"></div>
        <div class="audio-line"></div>
        <div class="audio-line"></div>
        <div class="audio-line"></div>
        <div class="audio-line"></div>
        <div class="audio-line"></div>
        <div class="audio-line"></div>
      </div>
      <div class="loading-spinner">
        <div class="spinner-track"></div>
        <div class="spinner-arc"></div>
      </div>
    </div>

  </div>

  <p class="hint">Hover to wake → click to listen → loading → glass idle</p>

  <script>
    const scene = document.getElementById('scene');
    const overlayEl = document.getElementById('overlayEl');
    const confirmToast = document.getElementById('confirmToast');
    const confirmClose = document.getElementById('confirmClose');

    // States: idle | hover | ready | listening | loading
    let state = 'idle';
    let loadingTimer = null;
    let idleTimer = null;
    let toastTimer = null;
    let toastDismissTimer = null;

    function showConfirmToast() {
      confirmToast.classList.remove('visible');
      void confirmToast.offsetWidth;
      confirmToast.classList.add('visible');

      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        confirmToast.classList.remove('visible');
      }, 4000);
    }

    function hideConfirmToast() {
      clearTimeout(toastTimer);
      confirmToast.classList.remove('visible');
    }

    confirmClose.addEventListener('click', (e) => {
      e.stopPropagation();
      hideConfirmToast();
    });

    // Hover: glass idle → hover (fill solid, stroke changes, toast slides in, dot appears)
    overlayEl.addEventListener('mouseenter', () => {
      if (state === 'idle') {
        state = 'hover';
        scene.className = 'scene hover';
      }
    });

    overlayEl.addEventListener('mouseleave', () => {
      if (state === 'hover') {
        state = 'idle';
        scene.className = 'scene';
      }
    });

    // Click: start the full sequence
    scene.addEventListener('click', () => {
      clearTimeout(loadingTimer);
      clearTimeout(idleTimer);
      clearTimeout(toastDismissTimer);
      hideConfirmToast();

      if (state === 'idle' || state === 'hover') {
        // Activate → ready (brief), then auto-listen
        state = 'ready';
        scene.className = 'scene ready';

        toastDismissTimer = setTimeout(() => {
          if (state === 'ready') {
            state = 'listening';
            scene.className = 'scene listening';

            loadingTimer = setTimeout(() => {
              state = 'loading';
              scene.className = 'scene loading';

              idleTimer = setTimeout(() => {
                state = 'idle';
                scene.className = 'scene';
                setTimeout(showConfirmToast, 300);
              }, 2000);
            }, 2000);
          }
        }, 2000);

      } else if (state === 'ready') {
        // Skip waiting, go straight to listening
        state = 'listening';
        scene.className = 'scene listening';

        loadingTimer = setTimeout(() => {
          state = 'loading';
          scene.className = 'scene loading';

          idleTimer = setTimeout(() => {
            state = 'idle';
            scene.className = 'scene';
            setTimeout(showConfirmToast, 300);
          }, 2000);
        }, 2000);

      } else {
        // Cancel mid-sequence, go to ready
        state = 'ready';
        scene.className = 'scene ready';
      }
    });
  </script>

</body>
</html>
