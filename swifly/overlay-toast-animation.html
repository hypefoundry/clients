<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Swifly — Overlay + Toast Animation</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500&display=swap" />
  <style>
    /* ─────────────────────────────────────────────────────────
     * ANIMATION STORYBOARD
     *
     *    0ms   scene empty
     *  400ms   overlay appears (idle: grey ring, blurred fill)
     *  900ms   toast slides in from right, overlay activates
     *          (gradient + glow fade in simultaneously)
     * 1300ms   everything settled
     *
     * Click to replay the sequence.
     * ───────────────────────────────────────────────────────── */

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #000000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Poppins, -apple-system, BlinkMacSystemFont, sans-serif;
      color: #fff;
      overflow: hidden;
    }

    /* ── Scene container ── */
    .scene {
      display: flex;
      align-items: center;
      gap: 8px;
      position: fixed;
      bottom: 24px;
      right: 24px;
      cursor: pointer;
    }

    /* ══════════════════════════════════════════════════════════
       TOAST
       ══════════════════════════════════════════════════════════ */
    .micro-toast {
      border-radius: 36px;
      background-color: #101017;
      border: 1px solid #1b1b24;
      display: flex;
      align-items: center;
      padding: 8px 13px;
      gap: 5px;
      font-size: 11px;
      white-space: nowrap;
      opacity: 0;
      transform: translateX(20px) scale(0.97);
      transition:
        opacity 0.45s cubic-bezier(0.4, 0, 0.2, 1),
        transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .scene.ready .micro-toast {
      transition: none;
    }

    .scene.stage-2 .micro-toast {
      opacity: 1;
      transform: translateX(0) scale(1);
      transition:
        opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1),
        transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .click-or-hold {
      line-height: 140%;
      color: rgba(255, 255, 255, 0.85);
    }

    .key-badge {
      border-radius: 4px;
      background-color: #fff;
      border: 1px solid #e2e2e6;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3px 5px;
      font-size: 8px;
      color: #262626;
      font-weight: 500;
      line-height: 1;
    }

    /* ══════════════════════════════════════════════════════════
       OVERLAY
       ══════════════════════════════════════════════════════════ */
    .overlay {
      position: relative;
      width: 49px;
      height: 49px;
      flex-shrink: 0;
      /* Animation initial state */
      opacity: 0;
      transform: scale(0.92);
      transition: none;
    }

    .scene.stage-1 .overlay,
    .scene.stage-2 .overlay {
      opacity: 1;
      transform: scale(1);
      transition:
        opacity 0.4s ease,
        transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* Grey base ring */
    .ring-grey {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
      -webkit-mask: radial-gradient(circle, transparent 20px, black 21px, black 23px, transparent 24px);
      mask: radial-gradient(circle, transparent 20px, black 21px, black 23px, transparent 24px);
    }

    /* Gradient ring */
    .ring-gradient {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      opacity: 0;
      background: linear-gradient(
        to top,
        #2A004B 1%,
        #AD46FF 30%,
        #EEAFFF 54%,
        #43EE1D 78%,
        #F6FF00 100%
      );
      -webkit-mask: radial-gradient(circle, transparent 20px, black 21px, black 23px, transparent 24px);
      mask: radial-gradient(circle, transparent 20px, black 21px, black 23px, transparent 24px);
      transition: opacity 0.4s ease;
    }

    .scene.ready .ring-gradient {
      transition: none;
    }

    .scene.stage-2 .ring-gradient {
      opacity: 1;
    }

    /* Inner fill */
    .overlay-fill {
      position: absolute;
      inset: 3px;
      border-radius: 50%;
      background: rgba(16, 16, 23, 0.3);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: background 0.4s ease;
    }

    .scene.stage-2 .overlay-fill {
      background: #101017;
    }

    /* Center dot */
    .overlay-dot {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #AE45FF;
      transform: translate(-50%, -50%);
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1),
                  box-shadow 0.4s ease;
    }

    .scene.stage-2 .overlay-dot {
      transform: translate(-50%, -50%) scale(1.15);
      box-shadow: 0 0 20px rgba(174, 69, 255, 0.45);
    }

    /* Glow */
    .overlay-glow {
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      opacity: 0;
      background: linear-gradient(
        to top,
        rgba(42, 0, 75, 0.25) 1%,
        rgba(173, 70, 255, 0.2) 30%,
        rgba(238, 175, 255, 0.15) 54%,
        rgba(67, 238, 29, 0.2) 78%,
        rgba(246, 255, 0, 0.2) 100%
      );
      filter: blur(14px);
      transition: opacity 0.4s ease;
    }

    .scene.ready .overlay-glow {
      transition: none;
    }

    .scene.stage-2 .overlay-glow {
      opacity: 1;
    }

    /* ── Hint ── */
    .hint {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.25);
      font-size: 12px;
      letter-spacing: 0.02em;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .hint.hidden { opacity: 0; }
  </style>
</head>
<body>

  <div class="scene" id="scene" onclick="replay()">

    <!-- Toast -->
    <div class="micro-toast">
      <span class="click-or-hold">Click or hold</span>
      <div class="key-badge">fn</div>
      <span class="click-or-hold">to start dictating</span>
    </div>

    <!-- Overlay -->
    <div class="overlay">
      <div class="ring-grey"></div>
      <div class="ring-gradient"></div>
      <div class="overlay-glow"></div>
      <div class="overlay-fill"></div>
      <div class="overlay-dot"></div>
    </div>

  </div>

  <p class="hint" id="hint">Click to replay</p>

  <script>
    const scene = document.getElementById('scene');
    const hint = document.getElementById('hint');
    let isActive = false;

    /* ── Timing constants ── */
    const STAGE_1_DELAY = 400;
    const STAGE_2_DELAY = 900;

    function activate() {
      scene.classList.remove('ready');
      hint.classList.add('hidden');

      if (scene.classList.contains('stage-1')) {
        // Overlay already visible, just activate
        scene.classList.add('stage-2');
        isActive = true;
        setTimeout(() => hint.classList.remove('hidden'), 500);
      } else {
        // Full intro sequence
        scene.classList.remove('stage-1', 'stage-2');
        setTimeout(() => scene.classList.add('stage-1'), STAGE_1_DELAY);
        setTimeout(() => {
          scene.classList.add('stage-2');
          isActive = true;
          setTimeout(() => hint.classList.remove('hidden'), 500);
        }, STAGE_2_DELAY);
      }
    }

    function deactivate() {
      scene.classList.remove('stage-2');
      hint.classList.add('hidden');
      isActive = false;

      // Show hint after reverse animation settles
      setTimeout(() => hint.classList.remove('hidden'), 600);
    }

    function handleClick() {
      if (isActive) {
        deactivate();
      } else {
        activate();
      }
    }

    scene.addEventListener('click', handleClick);

    // Auto-play on load
    activate();
  </script>

</body>
</html>
